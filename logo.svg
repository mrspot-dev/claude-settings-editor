<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B"/>
      <stop offset="50%" style="stop-color:#D97706"/>
      <stop offset="100%" style="stop-color:#B45309"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="200" height="200" rx="44" fill="#0A0A0F"/>
  <rect x="4" y="4" width="192" height="192" rx="40" fill="none" stroke="url(#bg)" stroke-width="2" opacity="0.3"/>
  <rect x="30" y="30" width="140" height="140" rx="32" fill="url(#bg)" filter="url(#glow)"/>
  <text x="100" y="118" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="64" fill="#0A0A0F" letter-spacing="-2">CC</text>
</svg>